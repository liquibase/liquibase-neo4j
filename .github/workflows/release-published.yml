name: Release Extension to Sonatype

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write
  actions: read # required by the reusable workflow's "Get build-logic ref" step

jobs:
  release:
    uses: liquibase/build-logic/.github/workflows/extension-release-published.yml@main
    secrets: inherit
    with:
      nameSpace: neo4j
